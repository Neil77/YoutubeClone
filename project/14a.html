<!DOCTYPE html>
<head>
    <style>
        .overlay{
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(0,0,0,0.8);
            position: fixed;
            top: 0;
            bottom: 0;
            right: 0;
            left: 0;
        }
        .sidebar{
            position: fixed;
            color: white;
            background-color: green;
            width: 100px;
            right: 0;
            top:0;
            bottom: 0px;
        }
        body{
            height: 1000px;
        }
        .modal{
            background-color: white;
            width: 300px;
            padding-top: 15px;
            padding-bottom: 15px;
            padding-right: 15px;
            padding-left: 15px;
            border-radius: 5px;
        }
        .text{
            font-family: Arial;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="sidebar">
    right sidebar
    </div>
    <div class="overlay">
        <div class="modal">
                <div class="text">
                    <p>Modal Title</p>
                    <p>This is a modal</p>
                    <button>Close</button>
                </div>
    </div>
</body>
