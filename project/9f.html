<!DOCTYPE html>
<html>
    <head>
        <title>Suggested friends</title>
        <style>
            .panel{
                font-family:arial;
                display: inline-block;
                margin-right:15px;
                border-style: outset;
                border-width: 1.2px;
                box-shadow: 5px 5px 5px 5px white;
                border-radius: 2px;
            }
            .cat-1{
                width:150px;
                height: 200px;
                border-radius: px;
            }
            .cat-2,
            .cat-3{
                border-radius: px;
            }
            .p1{
                font-size: 20px;
                font-weight: bold;
                margin:0;
            }
            .p2{
                color:grey;
                margin: 0; 
            }
            .b{
                height:35px;
                width:100px;
                background-color: rgb(45, 111, 244);
                color: white;
                border-radius: 5px;
                border-width: thin;
                margin-top:20px;
            }
            .b:hover{
                cursor:pointer;
                background-color: lightblue; 
            }
            .text{
                background-color: white;
                padding-left: 5px;
                padding-top: 5px;
                padding-bottom: 20px;
                border-radius: 2px;
            }   

        </style>
    </head>
    <body>
        <div class="panel">
            <img class="cat-1" src="pic-1.jpeg">
            <div class="text">
                <p class="p1">Oliver</p>
                <p class="p2">2 mutual friends</p>
                <button class="b">
                    Add Friend
                </button>
            </div>
        </div>
        <div class="panel">
            <img class="cat-1" src="pic-2.jpg">
            <div class="text">
                <p class="p1">Mimi</p>
                <p class="p2">3 mutual friends</p>
                <button class="b">
                    Add Friend
                </button>
            </div>
        </div>
        <div class="panel">
            <img class="cat-1" src="pic-3.jpg">
            <div class="text">
                <p class="p1">Rex</p>
                <p class="p2">4 mutual friends</p>
                <button class="b">
                    Add Friend
                </button>
            </div>
        </div>
    </body>
</html>
