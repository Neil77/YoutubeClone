<!DOCTYPE html>
<html>
    <head>
        <style>
            .flex{
                display: flex;
                flex-direction: column;
            }
            .panel{
                display: flex;
                flex-direction: row;
                align-items: center;
                margin-bottom: 20px;
            }
            .info{
                width: 200px;
            }
            .name {
                font-weight: bold;
                margin: 0px;
            }

            .handle {
                color: rgb(150, 150, 150);
                margin: 0px;
            }

            .category {
                color: rgb(150, 150, 150);
                margin: 0px;
            }
            .image{
                width: 50px;
                height: 50px;
                border-radius: 50px;
                margin-right: 15px; 
                border-radius: 25px;
            }
            .button{
                width: 80px;
                height: 35px;
                background-color: rgb(48, 158, 227);
                color: white; 
                border-width: 0;
                font-weight: bold;
                border-radius: 6px;
                font-size: 16px;
            }
        </style>
    </head>
    <body>
        <div class="flex">
            <div class="panel">
                <img class="image" src="pic-1.jpeg">
                <div class="info">
                    <p class="name">oliver</p>
                    <p class="handle">the cat</p>
                    <p class="category">Popular</p>
                </div>
                <button class="button">Follow</button>
            </div>
                <div class="panel">
                <img class="image" src="pic-2.jpg">
                <div class="info">
                <p class="name">Mimi</p>
                <p class="handle">Sleepy Cat</p>
                <p class="category">Popular</p>
      </div>
                <button class="button">Follow</button>
            </div>
                <div class="panel">
                <img class="image" src="pic-3.jpg">
                    <div class="info">
                    <p class="name">Rex</p>
                    <p class="handle">Happy Bulldog</p>
                    <p class="category">Popular</p>
                </div>
                <button class="button">Follow</button>
            </div>
        </div>
    </body>
</html>
